name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Java JDK required for Android builds
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Install and set up Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. Get dependencies for mobile app
      - name: Install dependencies
        run: |
          cd shifa_mobile
          flutter pub get

      # 5. Compile release APK
      - name: Build APK
        run: |
          cd shifa_mobile
          flutter build apk --release

      # 6. Upload built APK as GitHub artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: shifa-android-app
          path: shifa_mobile/build/app/outputs/flutter-apk/app-release.apk
