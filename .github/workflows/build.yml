name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Java JDK required for Android builds
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Install and set up Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 3.5 Generate platform boilerplate
      - name: Create platform boilerplate
        run: |
          cd shifa_mobile
          flutter create --org com.shifa --project-name shifa_mobile .

      # 4. Get dependencies for mobile app
      - name: Install dependencies
        run: |
          cd shifa_mobile
          flutter pub get

      # 4.5 Patch Proguard configurations in dependencies and generated android directory
      - name: Patch Proguard Configurations
        run: |
          echo "Patching proguard-android.txt to proguard-android-optimize.txt in pub-cache and android workspace..."
          find /home/runner/.pub-cache -name "build.gradle" -exec sed -i 's/proguard-android.txt/proguard-android-optimize.txt/g' {} +
          find shifa_mobile/android -name "build.gradle" -exec sed -i 's/proguard-android.txt/proguard-android-optimize.txt/g' {} +

      # 5. Compile release APK
      - name: Build APK
        run: |
          cd shifa_mobile
          flutter build apk --release

      # 6. Upload built APK as GitHub artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: shifa-android-app
          path: shifa_mobile/build/app/outputs/flutter-apk/app-release.apk
