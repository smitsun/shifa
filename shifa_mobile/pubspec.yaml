name: shifa_mobile
description: A premium Healthcare Education Mobile Application for medical students.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  youtube_player_flutter: ^9.1.1
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.2
  cloud_firestore: ^5.0.2
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3
  path: ^1.9.0
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  intl: ^0.19.0
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
